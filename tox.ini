[tox]
envlist = py{310,311,312,313}-dj{42,52}, package
requires = tox-uv>=1

[testenv]
runner = uv-venv-lock-runner
extras = dev
deps =
    dj42: django>=4.2,<5.0
    dj52: django>=5.2,<5.3
commands = pytest {posargs}

[testenv:package]
description = Build wheel and verify imports
skip_install = false
deps =
commands =
    uv build --out-dir {envtmpdir}/dist
    python -c "
import subprocess, sys, pathlib
dist = sorted(pathlib.Path(r'{envtmpdir}/dist').glob('*.whl'))[-1]
subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', str(dist)])
import wiretap
print('wiretap', wiretap.__version__, 'OK')
"
