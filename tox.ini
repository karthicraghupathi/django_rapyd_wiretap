[tox]
envlist = py{310,311,312,313}-dj{42,52}, package
requires = tox-uv>=1

[testenv]
runner = uv-venv-lock-runner
extras = dev
deps =
    dj42: django>=4.2,<5.0
    dj52: django>=5.2,<5.3
commands = pytest {posargs}

[testenv:package]
description = Build wheel and verify imports
runner = uv-venv-lock-runner
extras =
commands =
    uv build
    python -c "import subprocess, sys, glob; w=sorted(glob.glob('dist/*.whl'))[-1]; subprocess.check_call([sys.executable,'-m','pip','install','--quiet',w]); import wiretap; print(wiretap.__version__)"
