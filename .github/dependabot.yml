version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        update-types: ["minor", "patch"]

  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: weekly
    groups:
      pre-commit-hooks:
        update-types: ["minor", "patch"]
