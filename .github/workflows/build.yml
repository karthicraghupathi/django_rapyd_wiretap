name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Verify wheel assets
        run: unzip -l dist/*.whl | grep -E '(migrations|py\.typed)'

      - name: Smoke-test install from wheel
        run: |
          uv venv /tmp/smoke-venv
          uv pip install --python /tmp/smoke-venv dist/*.whl
          /tmp/smoke-venv/bin/python -c "import wiretap; print(wiretap.__version__)"
